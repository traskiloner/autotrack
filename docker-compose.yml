version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: autotrack_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${DB_NAME:-autotrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autotrack_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: autotrack_backend
    restart: always
    environment:
      - PORT=5001
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-autotrack}
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_change_me_123}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_pass}@db:5432/${DB_NAME:-autotrack}?schema=public
    depends_on:
      - db
    networks:
      - autotrack_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: autotrack_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - autotrack_network

  gateway:
    image: nginx:stable-alpine
    container_name: autotrack_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - autotrack_network

volumes:
  postgres_data:

networks:
  autotrack_network:
    driver: bridge
